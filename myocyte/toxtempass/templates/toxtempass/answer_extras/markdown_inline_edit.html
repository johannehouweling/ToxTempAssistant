<!-- Shared citation/markdown rendering for BOTH answer fields and round-2
     suggestions, so they cite identically. Inline "_(Source: LABEL)_" markers
     become hoverable footnotes [n] (deduped per text); a source whose LABEL has
     a URL (from the suggestion's citation map) renders as a footnote link.
     Answer fields are also click-to-edit (textarea is the source of truth). -->
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script>
(function () {
    if (typeof marked === 'undefined') return;  // loaded by the script tag above
    var toHtml = (typeof marked.parse === 'function') ? marked.parse
               : (typeof marked.marked === 'function') ? marked.marked : marked;

    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
            .replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Resolve one source entry to {label, url}. A footnote becomes a clickable
    // link when, in priority order: (1) a verified urlMap entry exists (round-2
    // suggestion citations), (2) the entry is "LABEL | URL", (3) the entry is a
    // bare http(s) URL, or (4) the entry is a bare DOI (10.x/...). Otherwise it
    // stays a hover-only footnote (e.g. an uploaded document name). Only http(s)
    // ever becomes an href; DOMPurify drops anything unsafe downstream.
    function resolveSource(entry, urlMap) {
        // A model that writes "_(Source: A; Source: B)_" leaves a stray "Source:"
        // on the 2nd entry after the ; split — strip it so the label stays clean.
        entry = entry.replace(/^\s*sources?\s*:\s*/i, '');
        var label = entry, url = '';
        var bar = entry.indexOf('|');
        if (bar >= 0) {
            label = entry.slice(0, bar).trim();
            url = entry.slice(bar + 1).trim();
        }
        if (urlMap[label]) { url = urlMap[label]; }
        else if (urlMap[entry]) { label = entry; url = urlMap[entry]; }
        else if (!url) {
            if (/^https?:\/\/\S+$/i.test(label)) {
                url = label;
            } else {
                var doi = label.match(/\b10\.\d{4,9}\/\S+$/i);
                if (doi) { url = doi[0]; }
            }
        }
        if (url && /^10\.\d{4,9}\//i.test(url)) { url = 'https://doi.org/' + url; }
        // Validate the WHOLE url, not just the scheme prefix: "\S+$" rejects values
        // with embedded whitespace/control chars (TAB/CR/LF) or a smuggled second
        // scheme like "https://a x javascript:..." before they can reach an href.
        if (url && !/^https?:\/\/\S+$/i.test(url)) { url = ''; }
        return { label: label || entry, url: url };
    }

    // Convert "_(Source: LABEL)_" / "_(Sources: A, B)_" to footnotes, then render
    // markdown + sanitize. Footnotes link out when a URL/DOI is resolvable.
    //
    // De-duplication (issue #231): if the same reference is cited several times in
    // a row — or is the only reference in the whole text — only the LAST marker of
    // that run is rendered; the earlier identical markers are dropped. Bold
    // (**...**) is never rendered (issue #231); other Markdown is unaffected.
    function renderCitations(raw, urlMap) {
        urlMap = urlMap || {};
        // Headings must never render (issue #231): strip leading #/##/### ATX markers
        // up front. Line-anchored, so only the markers go and the heading text stays
        // as plain prose. (Bold is removed AFTER rendering, below — a raw ** strip
        // here could bridge two unrelated ** runs and delete the text between them.)
        raw = (raw || '').replace(/^[ \t]*#{1,6}[ \t]+/gm, '');
        var refs = [];
        function refNum(label) {
            var i = refs.indexOf(label);
            if (i < 0) { refs.push(label); i = refs.length - 1; }
            return i + 1;
        }
        // Pass 1: locate every "(Source: ...)" / "_(Sources: ...)_" marker.
        // A single regex CANNOT find the closing ")" reliably, because a source
        // LABEL is often an uploaded filename that itself contains parentheses,
        // e.g. "..._Cells_(NPCs)_using_...docx". A "[^)]+" capture stops at that
        // inner ")", mangling the citation and leaving the filename tail as
        // literal junk in the output. So we match each marker's START with a
        // regex, then walk forward tracking paren depth to find the ")" that
        // actually closes the group. (s[1] captures an optional wrapping "_".)
        var startRe = /(_?)\((Sources?):\s*/gi;
        var markers = [], s;
        while ((s = startRe.exec(raw)) !== null) {
            var wrapped = s[1] === '_';             // a "_(...)_"-wrapped marker?
            var contentStart = startRe.lastIndex;   // first char of the source list
            var depth = 1, j = contentStart, close = -1, sawClose = false;
            for (; j < raw.length; j++) {
                var ch = raw[j];
                if (ch === '(') { depth++; }
                else if (ch === ')') { sawClose = true; depth--; if (depth === 0) { close = j; break; } }
            }
            if (close < 0) {
                // Unbalanced "(Source:" — leave it untouched. If there was NO ")"
                // anywhere in the remainder, no later marker can close either, so
                // stop scanning entirely; otherwise many unclosed markers would each
                // scan to end-of-string (O(n^2) on malformed/adversarial input).
                if (!sawClose) { break; }
                continue;
            }
            var content = raw.slice(contentStart, close);
            var end = close + 1;                      // index just past the ")"
            // Consume the closing wrapping "_" ONLY when the marker actually opened
            // with one. An UNwrapped "(Source: X)" must NOT eat a following "_": it
            // may be the OPENING "_" of an adjacent italic, e.g.
            // "cultured (Source: p.pdf)_in vitro_" must keep its "_in vitro_".
            if (wrapped && raw[end] === '_') { end++; }
            var resolved = content.split(/[,;]/)
                .map(function (x) { return x.trim(); })
                .filter(Boolean)
                .map(function (e) { return resolveSource(e, urlMap); });
            markers.push({
                start: s.index, end: end,
                resolved: resolved,
                // Signature includes the resolved URL, not just the label: two
                // consecutive markers that share a label but resolve to DIFFERENT
                // urls are distinct references and must NOT be collapsed into one.
                sig: resolved.map(function (r) { return r.label + '\n' + r.url; }).join('||'),
            });
            startRe.lastIndex = end;                  // resume past this whole marker
        }
        // Render a marker only if it is the last one, or the NEXT marker cites a
        // different source — collapsing consecutive duplicates onto the last.
        var keep = markers.map(function (mk, i) {
            return i === markers.length - 1 || markers[i + 1].sig !== mk.sig;
        });

        // Pass 2: rebuild the text, replacing each marker span (start..end) with
        // its footnote(s). Walking spans (not a regex replace) keeps the rewrite
        // aligned with the balanced-paren matches collected above.
        function renderMarker(mk) {
            return mk.resolved.map(function (r) {
                var n = refNum(r.label), t = esc(r.label);
                if (r.url) {
                    return '<sup class="citation-ref"><a href="' + esc(r.url) +
                        '" target="_blank" rel="noopener noreferrer"' +
                        ' class="link-indigo text-decoration-none"' +
                        ' data-bs-toggle="tooltip" data-bs-title="' + t +
                        '">[' + n + ']</a></sup>';
                }
                return '<sup class="citation-ref" data-bs-toggle="tooltip"' +
                    ' data-bs-title="' + t + '">[' + n + ']</sup>';
            }).join('');
        }
        var withRefs = '', cursor = 0;
        markers.forEach(function (mk, i) {
            withRefs += raw.slice(cursor, mk.start);
            cursor = mk.end;
            if (keep[i]) { withRefs += renderMarker(mk); }  // else: suppressed dup
        });
        withRefs += raw.slice(cursor);

        var html = toHtml(withRefs);
        if (typeof DOMPurify !== 'undefined') {
            html = DOMPurify.sanitize(html, { ADD_ATTR: ['target'] });
        }
        // Bold must never render (issue #231): unwrap <strong>/<b> to plain text
        // AFTER marked tokenises and sanitises, so emphasis is removed without ever
        // deleting intervening text. marked leaves space-flanked or stray ** as
        // literal text (never <strong>), so "2 ** 3" and the like are untouched.
        return html.replace(/<\/?(?:strong|b)\b[^>]*>/gi, '');
    }

    function initTooltips(root) {
        if (typeof bootstrap === 'undefined' || !bootstrap.Tooltip) return;
        root.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(function (el) {
            bootstrap.Tooltip.getOrCreateInstance(el);
        });
    }

    // 1) Answer fields — click-to-edit markdown preview. Documents have no URLs,
    //    so footnotes here are hover-only.
    document.querySelectorAll('textarea[name^="question_"]').forEach(function (ta) {
        var preview = document.createElement('div');
        preview.className = 'md-preview border rounded p-2 mb-2 bg-light';
        preview.setAttribute('role', 'button');
        preview.setAttribute('tabindex', '0');
        preview.title = 'Click to edit';

        function showEditor() {
            preview.classList.add('d-none');
            ta.classList.remove('d-none');
            ta.focus();
            ta.dispatchEvent(new Event('input', { bubbles: true }));
        }
        function showPreview() {
            var v = (ta.value || '').trim();
            preview.innerHTML = v
                ? renderCitations(v, {})
                : '<span class="text-secondary fst-italic">Empty — click to edit</span>';
            initTooltips(preview);
            ta.classList.add('d-none');
            preview.classList.remove('d-none');
        }
        preview.addEventListener('click', function (e) {
            if (e.target.closest('a')) return;  // follow links instead of editing
            showEditor();
        });
        preview.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); showEditor(); }
        });
        ta.addEventListener('blur', showPreview);
        // External callers (e.g. promoting a round-2 suggestion) set ta.value while
        // the field is collapsed; this re-renders the preview without a blur cycle.
        ta.addEventListener('md:refresh', showPreview);

        ta.parentNode.insertBefore(preview, ta);
        showPreview();
    });

    // 2) Suggestions — render exactly like an answer: citations live INLINE in
    //    the prose (footnotes from "_(Source: X)_" markers, with URLs from the
    //    citation map). No separate source-link line — sources stay in the text.
    document.querySelectorAll('[data-suggestion-md]').forEach(function (el) {
        var raw = el.textContent || '';
        // Preserve the raw markdown source: rendering replaces innerHTML below, so
        // "Use this" must read the raw md from here (innerText would be stripped).
        el.dataset.suggestionRaw = raw;
        var cites = [];
        try { cites = JSON.parse(el.getAttribute('data-citations') || '[]') || []; } catch (e) {}
        var urlMap = {};
        cites.forEach(function (c) { if (c && c.label && c.url) urlMap[c.label] = c.url; });

        el.innerHTML = renderCitations(raw, urlMap);
        initTooltips(el);
    });
})();
</script>
