{% extends "base.html" %}
{% block title %}Password Reset Complete — ToxTempAssistant{% endblock %}
{% block content %}

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card mt-4">
        <div class="card-body">
          <h5 class="card-title text-success">
            <i class="bi bi-check-circle me-1"></i>Password reset complete
          </h5>
          <p class="text-muted">
            Your password has been set. You can now log in with your new password.
          </p>
          <a href="{% url 'login' %}" class="btn btn-primary">Sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
