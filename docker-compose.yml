name: toxtempass
services:
  # Database
  postgres_for_django:
    profiles: ["prod"]
    image: postgres:17-alpine
    container_name: postgres_for_django
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./.env}
    expose:
      - 5432
    networks:
      - db_network
    volumes:
      - db_data:/var/lib/postgresql/data

  postgres_test_for_django:
    profiles: ["test"]
    image: postgres:17-alpine
    container_name: postgres_test_for_django
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-./.env} # Use ENV ENV_FILE to .env.dummy for testing to run properly
    expose:
      - 5432
    networks:
      - db_network
    # No volumes to ensure ephemeral test DB

  # MinIO
  minio:
    profiles: ["prod","test"]
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - ${ENV_FILE:-./.env}
    # For remote access to the MinIO console, map port 9001 to the host
    # Also needs attachment to the default bridge network in deploy.yml
    # ports:
    #   - "127.0.0.1:9001:9001"
    expose:
      - 9000
      - 9001
    volumes:
      - minio_blob_data:/data
    networks:
      - data_network

  minio_init:
    profiles: ["prod","test"]
    # Custom image bakes init.sh in (Dockerfile sets ENTRYPOINT). No bind
    # mount, no entrypoint override — the container is self-contained.
    image: ghcr.io/johannehouweling/toxtempassistant-minio-init:${GIT_TAG:-latest}
    build:
      context: .
      dockerfile: myocyte/dockerfiles/minio/Dockerfile
    container_name: minio_init
    depends_on:
      - minio
    env_file:
      - ${ENV_FILE:-./.env}
    networks:
      - data_network
    restart: "no"

  backup:
    profiles: ["prod"]
    depends_on:
      - postgres_for_django
      - minio
    image: ghcr.io/johannehouweling/toxtempassistant-backup:${GIT_TAG:-latest}
    build:
      context: .
      dockerfile: myocyte/dockerfiles/backup-scheduler/Dockerfile
    env_file:
      - ./.env
    environment:
      TZ: Europe/Amsterdam
      CRON_LOG: "/logs/backup-cron.log"
    volumes:
      # docker.sock approach is single-node only; will be replaced when
      # migrating to Docker Swarm (cross-node service discovery / direct TCP
      # to the postgres+minio overlay network).
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backups:/work/backups
      - ./myocyte/logs:/logs
    restart: unless-stopped

  # Django app
  djangoapp:
    profiles: ["test", "prod"]
    # Pull from ghcr.io in prod (set by deploy.yml via GIT_TAG=vX.Y.Z).
    # Local dev / CI builds still work because `build:` below is honoured
    # whenever the image isn't present locally and `--build` is passed
    # (or by `compose build`). When GIT_TAG is unset the tag falls back
    # to `latest` for convenience in dev.
    image: ghcr.io/johannehouweling/toxtempassistant:${GIT_TAG:-latest}
    build:
      context: .
      dockerfile: myocyte/dockerfiles/djangoapp/Dockerfile
      args:
        GIT_HASH: ${GIT_HASH}
        GIT_TAG: ${GIT_TAG}
      # Cross-build cache backed by GitHub Actions cache (no-op locally —
      # `type=gha` is only honoured when the GH Actions cache server is
      # reachable, e.g. inside `docker/setup-buildx-action`). mode=max also
      # caches intermediate layers (deps, apt, etc.), not just the final image.
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    labels:
      org.opencontainers.image.revision: ${GIT_HASH}
      org.opencontainers.image.version: ${GIT_TAG}
    user: root
    container_name: djangoapp
    restart: unless-stopped
    entrypoint: ["/home/myocyte/django_startup.sh"]
    command: >
      poetry run gunicorn myocyte.wsgi:application
      --bind 0.0.0.0:8000
      --log-level=info
      --max-requests=1000
      --timeout=600
      --keep-alive=5
      --graceful-timeout=120
      --error-logfile=/home/myocyte/logs/gunicorn-error.log
      --access-logfile=/home/myocyte/logs/gunicorn-access.log
      --workers=3
    volumes:
      - ./myocyte/logs:/home/myocyte/logs
      - ./myocyte/static:/home/myocyte/static
      - ./test-results:/home/myocyte/test-results
    ports:
      - 8401:8000
    depends_on:
      # ensure in a production environment that the database is up before starting Django
      - ${POSTGRES_HOST:-postgres_for_django}
      - minio
    env_file:
      - ${ENV_FILE:-./.env}
    environment:
      - TESTING=${TESTING:-false} # Set to true for testing
      - GIT_HASH=${GIT_HASH}
      - GIT_TAG=${GIT_TAG}
    networks:
      - db_network
      - data_network
      ### ATTENTION ###
      # The djangoapp container needs to be connected to the db_network
      # to access the Postgres database, but also to the default bridge network
      # to allow it to be accessed from the host machine.
      # This is because the default bridge network is used by Docker Compose
      # `docker network connect bridge djangoapp`
networks:
  db_network:
    driver: bridge
  data_network:
    driver: bridge
volumes:
  db_data:
  minio_blob_data:
