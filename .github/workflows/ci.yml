name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # Skip CI on pushes that touch ONLY workflow YAML or markdown — those
    # don't change application behavior and shouldn't pay a 4–5 min test
    # cycle. Code/dependency/Dockerfile changes still trigger normally.
    # Iterating on deploy.yml? Use the Deploy workflow's `workflow_dispatch`
    # against an existing tag — the workflow file from main is honored, so
    # you don't need to release to test a deploy.yml change.
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'

permissions:
  contents: read
  actions: write         # required for type=gha BuildKit cache writes
  pull-requests: write   # required to post coverage comment on PRs

jobs:
  test:
    runs-on: ubuntu-latest
    # Skip the CI run that fires on semantic-release's "X.Y.Z" version-bump
    # commit — that commit only changes pyproject.toml + CHANGELOG.md, so
    # there's nothing here we haven't already tested. release.yml uses
    # `conclusion == 'success'` to gate; a skipped job leaves the workflow
    # at conclusion `skipped`, so release.yml correctly doesn't re-fire.
    # `pull_request` events have a null head_commit, so the != check
    # passes (PRs run CI as normal).
    if: ${{ github.event.head_commit.author.name != 'github-actions[bot]' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          filter: blob:none
          lfs: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker
        uses: docker/setup-docker-action@v4

      - name: Build Docker image
        run: |
          export GIT_HASH=$(git rev-parse HEAD)
          docker compose --profile test build \
          --build-arg TESTING=true \
          --build-arg GIT_HASH=$GIT_HASH \
          --build-arg ENV_FILE=.env.dummy
        env:
          POSTGRES_HOST: postgres_test_for_django
          # Make `docker compose build` delegate to `docker buildx bake`, which
          # actually honours `cache_from`/`cache_to: type=gha` from compose.
          # Without this, plain `compose build` ignores the BuildKit cache
          # exporters and every CI run rebuilds from scratch.
          COMPOSE_BAKE: "true"

      - name: Test in Docker
        run: |
          echo "🔨 Starting Docker compose tests…"
          export GIT_HASH=$(git rev-parse HEAD)

          # 1) bring up only Postgres in the background
          docker compose --profile test up -d postgres_test_for_django

          # 2) run pytest inside djangoapp, capturing its exit code
          docker compose --profile test run --rm \
            -e DJANGO_SETTINGS_MODULE=myocyte.settings \
            -e TESTING=true \
            djangoapp \
            sh -c "pytest -v \
              --junitxml=/home/myocyte/test-results/results.xml \
              --cov=toxtempass \
              --cov-report=xml:/home/myocyte/test-results/coverage.xml"
          code=$?

          # 3) tear down all containers & networks
          docker compose down

          # 4) report
          if [ $code -eq 0 ]; then
            echo "✅ Tests passed!"
          else
            echo "❌ Tests failed with exit code $code"
          fi
          exit $code
        env:
          TESTING: "true"
          ENV_FILE: .env.dummy # Use dummy env for testing
          POSTGRES_HOST: postgres_test_for_django
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # Uncomment if you need to use OpenAI API in tests

      - name: Code Coverage Summary Report
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: test-results/coverage.xml
          badge: true
          output: both
          add-comment: true

      - name: Surface failing tests
        if: always()
        uses: pmeier/pytest-results-action@main
        with:
          # A list of JUnit XML files, directories containing the former, and wildcard
          # patterns to process.
          # See @actions/glob for supported patterns.
          path: test-results/results.xml

          # (Optional) Add a summary of the results at the top of the report
          summary: true

          # (Optional) Select which results should be included in the report.
          # Follows the same syntax as `pytest -r`
          display-options: fEX

          # (Optional) Fail the workflow if no JUnit XML was found.
          fail-on-empty: true

          # (Optional) Title of the test results section in the workflow summary
          title: Test results

      - name: Upload test results
        if: always() # even on failure
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          retention-days: 2
          compression-level: 9
