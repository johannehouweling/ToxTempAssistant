name: Deploy

on:
  release:
    types: [published] # fires whenever a new GitHub Release is published
  # Manual trigger for ad-hoc swarm-side smoke tests without cutting a release.
  # Always pick an existing tag (image must already be on ghcr.io for this tag).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to deploy (e.g. v3.14.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-legacy:
    name: Deploy to legacy server
    # Legacy serves real traffic — only fire on actual releases, never on the
    # manual workflow_dispatch (which is for swarm-side smoke testing).
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    environment: legacy-server
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # we need full history & tags to checkout the correct tag
          fetch-depth: 0
          persist-credentials: false # don’t keep the default GITHUB_TOKEN
          token: ${{ secrets.PA_TOKEN }} # use your Personal Access Token

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.GIT_ACTIONS }}" > ~/.ssh/github_action
          chmod 600 ~/.ssh/github_action

      - name: Extract tag name and version
        run: |
          echo "TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          VERSION=$(grep -m1 '^version' pyproject.toml | cut -d '"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.REMOTE_SERVER_ADDRESS }}
          username: ${{ vars.REMOTE_SERVER_USERNAME }}
          key_path: /home/runner/.ssh/github_action
          script: |
            cd "${{ vars.REMOTE_SERVER_PATH }}"
            # Refresh the working tree to the released tag — we still need the
            # compose file at the right version; the djangoapp image itself is
            # pulled from ghcr.io rather than rebuilt on this server.
            git pull origin main
            git fetch --tags
            GIT_TAG="${{ github.event.release.tag_name }}"
            git checkout "$GIT_TAG"
            GIT_HASH=$(git rev-parse HEAD)
            export GIT_HASH GIT_TAG
            # Pull all registry images (djangoapp, backup, minio_init, plus
            # the off-the-shelf postgres / minio images), then start without
            # --build. Every prod service has an `image:` directive now, so
            # nothing builds on this server.
            sudo --preserve-env=GIT_HASH,GIT_TAG docker compose --profile prod pull
            sudo --preserve-env=GIT_HASH,GIT_TAG docker compose --profile prod up -d
            # connect to default bridge network to allow communication with other containers
            sudo docker network connect bridge djangoapp 2>/dev/null || true
            # If remote access to minio console is needed, uncomment the following line
            # sudo docker network connect bridge minio

            # Wait for the in-container HEALTHCHECK (defined on the djangoapp
            # service in docker-compose.yml) to report `healthy`. The check
            # itself is a curl against gunicorn that only passes when Django
            # actually serves an HTTP response, so reaching `healthy` means the
            # site is up end-to-end.
            ready=0
            deadline=$((SECONDS + 300))
            while [ "$SECONDS" -lt "$deadline" ]; do
              status=$(sudo docker inspect --format '{{.State.Health.Status}}' djangoapp 2>/dev/null || echo missing)
              case "$status" in
                healthy)
                  ready=1
                  echo "djangoapp is healthy."
                  break
                  ;;
                *)
                  echo "Waiting for djangoapp to become healthy (current: ${status})..."
                  ;;
              esac
              sleep 10
            done

            if [ "$ready" -ne 1 ]; then
              echo "djangoapp did not become healthy within 300 seconds."
              sudo --preserve-env=GIT_HASH,GIT_TAG docker compose --profile prod ps
              sudo --preserve-env=GIT_HASH,GIT_TAG docker compose --profile prod logs --tail=200 djangoapp
              exit 1
            fi

  deploy-swarm:
    name: Deploy to Swarm cluster
    runs-on: ubuntu-latest
    environment: tgx1-server
    # On `release` events: swarm is being exercised in parallel with legacy
    # during cutover, so a swarm failure must not block the workflow (legacy
    # is still the canonical target). On `workflow_dispatch`: it's a manual
    # smoke test and we want it to fail loudly so regressions don't sneak by.
    continue-on-error: ${{ github.event_name == 'release' }}
    steps:
      - name: Resolve target tag
        # Single source of truth for the tag we're deploying — release tag for
        # automatic runs, the workflow_dispatch input for manual smoke tests.
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout the target tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.value }}

      - name: Resolve commit SHA of the target tag
        # Use the checked-out tag's commit, not github.sha. On `workflow_dispatch`
        # github.sha is the workflow ref's HEAD (typically main), which can be
        # ahead of the tag we're deploying. Read from the freshly-checked-out
        # working tree so labels/env reflect the real deployed revision.
        id: sha
        run: echo "value=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Cluster-specific deploy key (distinct from legacy's GIT_ACTIONS).
          # Public counterpart must be in ~jhouweling/.ssh/authorized_keys on
          # the manager.
          echo "${{ secrets.TGX1_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ vars.TGX1_IP_ADDRESS }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stage compose files on manager and deploy
        # Secrets stay on the cluster: prod .env lives at
        # /mnt/gluster/docker/toxtempassistant/config/.env (mode 600, owned by
        # jhouweling). The runner pushes ONLY the two compose files into a
        # temp dir on the manager and runs `docker stack deploy` over SSH
        # with ENV_FILE pointing at the gluster-resident .env. Rendering
        # happens on the manager, so secrets never traverse GitHub.
        env:
          REMOTE: ${{ vars.TGX1_USERNAME }}@${{ vars.TGX1_IP_ADDRESS }}
          GIT_HASH: ${{ steps.sha.outputs.value }}
          GIT_TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          DEPLOY_DIR="/tmp/toxtempass-deploy-${GIT_TAG}"
          SSH_OPTS="-i $HOME/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"

          # Push the two compose files to a fresh temp dir on the manager.
          ssh $SSH_OPTS "$REMOTE" "rm -rf '$DEPLOY_DIR' && mkdir -p '$DEPLOY_DIR'"
          scp $SSH_OPTS docker-compose.yml docker-stack.yml "$REMOTE:$DEPLOY_DIR/"

          # Run `docker stack deploy` ON the manager so it can read .env from
          # gluster. `docker stack deploy` ignores compose profiles, so render
          # via `compose config --profile prod` first and pipe to deploy.
          # `compose config` inlines env_file content into `environment:`, so
          # the rendered output passed to stack deploy carries no env_file
          # references.
          # Render + filter + deploy on the manager. Comments are deliberately
          # kept OUT of the ssh-string body — bash on the runner expands
          # backticks inside double-quoted strings, which trashed an earlier
          # attempt. Two transforms applied to the rendered config before
          # stack deploy: (1) the overlay drops depends_on via !reset because
          # compose config rewrites it into a v2-map form stack deploy
          # rejects; (2) we strip the `profiles:` field (also rejected by
          # stack deploy) via a tiny python filter on the manager.
          ssh $SSH_OPTS "$REMOTE" "
            set -eu
            cd '$DEPLOY_DIR'
            export ENV_FILE=/mnt/gluster/docker/toxtempassistant/config/.env
            export GIT_HASH='$GIT_HASH' GIT_TAG='$GIT_TAG'
            docker compose --profile prod \
              -f docker-compose.yml -f docker-stack.yml config \
              | python3 -c 'import yaml, sys; d = yaml.safe_load(sys.stdin); d.pop(\"name\", None); [s.pop(k, None) for s in d.get(\"services\", {}).values() for k in (\"profiles\", \"develop\", \"pull_policy\", \"attach\")]; sys.stdout.write(yaml.safe_dump(d, sort_keys=False))' \
              | docker stack deploy -c - toxtempass
            rm -rf '$DEPLOY_DIR'
          "

      - name: Verify Swarm djangoapp boot
        env:
          REMOTE: ${{ vars.TGX1_USERNAME }}@${{ vars.TGX1_IP_ADDRESS }}
        run: |
          set -euo pipefail
          SSH_OPTS="-i $HOME/.ssh/id_ed25519 -o StrictHostKeyChecking=yes"
          # Wait for swarm to report the task as `Running` — with the
          # in-container HEALTHCHECK on djangoapp (see docker-compose.yml),
          # swarm holds the task in `Starting` until the first successful
          # healthcheck. Healthcheck = curl against gunicorn, so `Running`
          # means Django is actually serving HTTP. This works regardless of
          # which node the task lands on, unlike a `docker exec` probe.
          ready=0
          deadline=$((SECONDS + 300))
          while [ "$SECONDS" -lt "$deadline" ]; do
            state=$(ssh $SSH_OPTS "$REMOTE" "docker service ps toxtempass_djangoapp --filter desired-state=running --format '{{.CurrentState}}' | head -n1")
            case "$state" in
              Running\ *)
                ready=1
                echo "Swarm djangoapp task is healthy: ${state}"
                break
                ;;
              *)
                echo "Waiting for Swarm djangoapp task to become healthy (current: ${state:-unknown})..."
                ;;
            esac
            sleep 10
          done

          if [ "$ready" -ne 1 ]; then
            echo "Swarm djangoapp did not become healthy within 300 seconds."
            ssh $SSH_OPTS "$REMOTE" "docker service ls || true; docker service ps --no-trunc toxtempass_djangoapp || true; docker service logs --tail 200 toxtempass_djangoapp || true"
            exit 1
          fi
