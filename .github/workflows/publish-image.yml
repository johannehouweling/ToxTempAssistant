name: Publish image

# Publishes every container image declared in docker-compose.yml to ghcr.io
# on each `vX.Y.Z` tag. The prod stack (Docker Swarm — see deploy.yml) must
# never build images locally; every service that deploys to prod needs its
# own pre-built image here. Add a new matrix entry when introducing another
# `build:`-only service to compose.

on:
  push:
    tags:
      - 'v*'

permissions:
  actions: write     # required for type=gha BuildKit cache writes
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: toxtempassistant
            dockerfile: myocyte/dockerfiles/djangoapp/Dockerfile
            description: "ToxTempAssistant — LLM-assisted ToxTemp drafting"
          - image: toxtempassistant-backup
            dockerfile: myocyte/dockerfiles/backup-scheduler/Dockerfile
            description: "ToxTempAssistant backup scheduler"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_HASH=${{ github.sha }}
            GIT_TAG=${{ github.ref_name }}
          # Per-image cache scope so the two builds don't thrash each other's layers.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read   # PA_TOKEN drives `gh release`; GITHUB_TOKEN perms unused
    steps:
      # Create the GitHub Release once both images are up. Using PA_TOKEN (not
      # the default GITHUB_TOKEN) so the resulting `release: published` event
      # fires `deploy.yml` — releases created by GITHUB_TOKEN don't trigger
      # downstream workflows.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PA_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping create."
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
