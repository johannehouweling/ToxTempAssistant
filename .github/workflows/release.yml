name: Release

permissions:
  contents: write # allow pushing commits/tags

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  semantic-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.PA_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          # Persist the PAT (not the default GITHUB_TOKEN) so that the tag
          # push from `semantic-release version` triggers downstream
          # workflows like publish-image.yml. GITHUB_TOKEN-pushed tags
          # don't fire `on: push: tags` by GitHub policy.
          token: ${{ secrets.PA_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install semantic-release
        run: |
          python -m pip install --upgrade pip
          pip install "python-semantic-release[git]"
      - name: Configure git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Release Version (bump/tag/changelog)
        env:
          GH_TOKEN: ${{ secrets.PA_TOKEN }}
        run: |
          # --no-vcs-release: do NOT create the GitHub Release here. The
          # `release` job in publish-image.yml creates it AFTER the images
          # are pushed, so deploy.yml's `release: published` trigger doesn't
          # fire while publish-image is still building (race condition).
          semantic-release version --no-vcs-release
